# Cove Orchestrator — Docker Compose
# All infrastructure that runs on Beast
# Usage: docker compose -f docker/docker-compose.yml up -d

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cove
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cove_dev_2026}
      POSTGRES_DB: cove
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cove"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Temporal Server ─────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: cove
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-cove_dev_2026}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamic_config.yml
    ports:
      - "7233:7233"  # gRPC
    volumes:
      - ./temporal-dynamic-config.yml:/etc/temporal/dynamic_config.yml

  # ─── Temporal Web UI ─────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.30.3
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  # ─── Temporal Worker (our Python code) ───────────────────────────────
  temporal-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      POSTGRES_DSN: postgresql://cove:${POSTGRES_PASSWORD:-cove_dev_2026}@postgres:5432/cove
      LITELLM_API_BASE: ${LITELLM_API_BASE:-http://litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ../temporal:/app/temporal
      - ../mcp-servers:/app/mcp-servers
      - ../agents:/app/agents

  # ─── LiteLLM Proxy ──────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]

  # ─── Langfuse (LLM Observability) ───────────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cove:${POSTGRES_PASSWORD:-cove_dev_2026}@postgres:5432/cove
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-in-production}
      NEXTAUTH_URL: http://localhost:3000
      SALT: ${LANGFUSE_SALT:-changeme-in-production}
    ports:
      - "3000:3000"

  # ─── NightScout (Intelligence Pipeline) ────────────────────────────
  nightscout:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nightscout
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
    environment:
      SEARXNG_URL: ${SEARXNG_URL:-https://search.beast.amplifiedpartners.ai}
      LITELLM_URL: ${LITELLM_API_BASE:-http://litellm:4000}
      POSTGRES_DSN: postgresql://cove:${POSTGRES_PASSWORD:-cove_dev_2026}@postgres:5432/cove
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NIGHTSCOUT_SCORING_MODEL: ${NIGHTSCOUT_SCORING_MODEL:-deepseek/deepseek-chat}
      NIGHTSCOUT_BATCH_SIZE: ${NIGHTSCOUT_BATCH_SIZE:-10}
    volumes:
      - nightscout_logs:/var/log

  # ─── NightScout MCP Server ─────────────────────────────────────────
  nightscout-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nightscout-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://cove:${POSTGRES_PASSWORD:-cove_dev_2026}@postgres:5432/cove

volumes:
  postgres_data:
  nightscout_logs:

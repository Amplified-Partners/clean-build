# LiteLLM Proxy Configuration — Amplified Partners
# Tiered model routing: cheap → medium → premium

model_list:
  # ─── Tier 1: Cheap (Linting, formatting, simple transforms) ─────
  - model_name: cheap
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      max_tokens: 8192

  # ─── Tier 2: Medium (Code generation, reviews) ──────────────────
  - model_name: medium
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      max_tokens: 8192

  # ─── Tier 3: Premium (Architecture, security, complex reasoning) ─
  - model_name: premium
    litellm_params:
      model: anthropic/claude-opus-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      max_tokens: 8192

  # ─── Fallback: Cheap backup ─────────────────────────────────────
  - model_name: fallback
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── Grok (cheap tier — fast coding) ────────────────────────────
  - model_name: grok-code-fast-1
    litellm_params:
      model: xai/grok-code-fast-1
      api_key: os.environ/XAI_API_KEY
    model_info:
      max_tokens: 8192

  # ─── Grok (medium tier — general) ───────────────────────────────
  - model_name: grok-4-fast
    litellm_params:
      model: xai/grok-4-fast
      api_key: os.environ/XAI_API_KEY
    model_info:
      max_tokens: 8192

litellm_settings:
  drop_params: true
  set_verbose: false
  max_budget: 100.0        # Monthly budget cap in USD
  budget_duration: "1mo"
  num_retries: 2
  request_timeout: 120
  telemetry: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL

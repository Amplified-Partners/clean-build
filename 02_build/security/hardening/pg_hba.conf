# PostgreSQL Host-Based Authentication (pg_hba.conf) — Beast Hardening
# =====================================================================
# Mount into Postgres containers at /etc/postgresql/pg_hba.conf
# or via POSTGRES_HBA_FILE environment variable.
#
# Policy: Allow local, Docker bridge, and Tailscale. Reject everything else.
#
# Reference: https://www.postgresql.org/docs/16/auth-pg-hba-conf.html
# Signed-by: Devon-abaf | 2026-05-09 | session devin-abaf337e1eda492f85af1d26fa1614b9

# TYPE    DATABASE    USER        ADDRESS                 METHOD

# ─── Local connections (Unix socket) ─────────────────────────────────────────
local   all         all                                 trust

# ─── Loopback (from within the container itself) ─────────────────────────────
host    all         all         127.0.0.1/32            scram-sha-256
host    all         all         ::1/128                 scram-sha-256

# ─── Docker bridge networks (inter-container communication) ──────────────────
# Docker default bridge: 172.17.0.0/16
# Docker user-defined bridges: 172.18.0.0/16 - 172.31.0.0/16
# Covering all with 172.16.0.0/12
host    all         all         172.16.0.0/12           scram-sha-256

# ─── Tailscale mesh VPN (remote admin) ───────────────────────────────────────
host    all         all         100.64.0.0/10           scram-sha-256

# ─── Reject everything else ──────────────────────────────────────────────────
host    all         all         0.0.0.0/0               reject
host    all         all         ::/0                    reject

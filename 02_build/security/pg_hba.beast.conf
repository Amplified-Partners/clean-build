# pg_hba.conf — Beast PostgreSQL hardening template
# Restricts connections to local, Docker bridge, and Tailscale networks only.
# All other sources are rejected.
#
# Deploy: mount as volume into postgres container at /etc/postgresql/pg_hba.conf
# or copy into the data directory and reload (SELECT pg_reload_conf();).
#
# Devon-7ac0 | 2026-05-09 | AMP-289

# TYPE  DATABASE  USER  ADDRESS             METHOD

# Local unix socket
local   all       all                       scram-sha-256

# Localhost (IPv4 + IPv6)
host    all       all   127.0.0.1/32        scram-sha-256
host    all       all   ::1/128             scram-sha-256

# Docker bridge networks (172.16.0.0/12 covers all default Docker subnets)
host    all       all   172.16.0.0/12       scram-sha-256

# Tailscale CGNAT range (100.64.0.0/10 — all Tailscale IPs)
host    all       all   100.64.0.0/10       scram-sha-256

# Reject everything else explicitly
host    all       all   0.0.0.0/0           reject
host    all       all   ::/0                reject

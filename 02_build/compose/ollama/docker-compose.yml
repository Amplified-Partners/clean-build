# Authored by Devon-a9a7 | 2026-05-03 | AMP-46 Ollama port-mapping fix
# Updated by Devon-aacb | 2026-05-04 | AMP-75 add cpus: '48' limit (70B was hitting 4806% CPU / load 46)
# Beast source-of-truth: /opt/amplified/apps/ollama/docker-compose.yml. Mirror in Amplified-Partners/clean-build at 02_build/compose/ollama/docker-compose.yml.
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=10m
    networks:
      - amplified-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.beast.amplifiedpartners.ai`)"
      - "traefik.http.routers.ollama.tls.certresolver=letsencrypt"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
    deploy:
      resources:
        limits:
          cpus: '48'
          memory: 96G
        reservations:
          memory: 48G

volumes:
  ollama-data:

networks:
  amplified-net:
    external: true

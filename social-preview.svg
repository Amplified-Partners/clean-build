<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b4332;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d6a4f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b4332;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="white" stroke-width="1"/>
  </g>

  <!-- Company name -->
  <text x="640" y="180" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">
    Amplified Partners
  </text>

  <!-- Repo name -->
  <text x="640" y="260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="300" fill="#95d5b2" text-anchor="middle">
    Clean Build Workspace
  </text>

  <!-- Divider -->
  <line x1="440" y1="300" x2="840" y2="300" stroke="#52b788" stroke-width="2" opacity="0.6"/>

  <!-- Tagline -->
  <text x="640" y="360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#b7e4c7" text-anchor="middle">
    The governed operating environment for AI agents
  </text>

  <!-- Directory structure hint -->
  <text x="640" y="420" font-family="'Courier New', monospace" font-size="18" font-weight="400" fill="#74c69d" text-anchor="middle" letter-spacing="1">
    00_authority/ · 01_truth/ · 02_build/ · 03_shadow/
  </text>

  <!-- Principles -->
  <text x="640" y="470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="300" fill="#52b788" text-anchor="middle" letter-spacing="3">
    HONESTY · TRANSPARENCY · ATTRIBUTION · WIN-WIN
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1280" height="60" fill="#1b4332" opacity="0.5"/>
  <text x="640" y="618" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#95d5b2" text-anchor="middle">
    amplifiedpartners.ai — Defrictioning small businesses, one by one
  </text>
</svg>

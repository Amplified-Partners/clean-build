# PR validation — code quality checks on pull requests to main.
#
# For this repo (governance/markdown workspace):
#   - Validates markdown links are not broken
#   - Checks YAML frontmatter is parseable
#   - Runs Python lint (ruff) on any .py files if present
#
# Devon-8443 | 2026-05-06 | session devin-8443d1ee073243db8c6fa66f39b33745
name: PR validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  linear-ticket:
    name: Linear ticket reference
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title or body contains AMP-XXX
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_ACTOR:-}" = "dependabot[bot]" ]; then
            echo "Dependabot PR — skipping Linear-ticket requirement."
            exit 0
          fi
          body_stripped=$(printf '%s' "${PR_BODY:-}" | python3 -c 'import re,sys; sys.stdout.write(re.sub(r"<!--.*?-->", "", sys.stdin.read(), flags=re.DOTALL))')
          combined="${PR_TITLE}"$'\n'"${body_stripped}"
          if printf '%s' "$combined" | grep -Eqi 'AMP-[0-9]+'; then
            ticket=$(printf '%s' "$combined" | grep -Eoi 'AMP-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')
            echo "Found Linear ticket reference: $ticket"
          else
            echo "::error::PR must reference a Linear ticket (AMP-NNN) in the title or body."
            exit 1
          fi

  branch-name:
    name: Branch name convention
    runs-on: ubuntu-latest
    steps:
      - name: Check head branch matches allowed pattern
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_ACTOR:-}" = "dependabot[bot]" ]; then
            echo "Dependabot PR — skipping branch-name check."
            exit 0
          fi
          pattern='^(cove|devin|devon|clawd|cassian|antigravity|openclaw|dependabot|release|feature|fix|chore|hotfix|docs|refactor|test|ci)/.+'
          if printf '%s' "$HEAD_REF" | grep -Eq "$pattern"; then
            echo "Branch name '$HEAD_REF' matches allowed pattern."
          else
            echo "::error::Branch '$HEAD_REF' does not match allowed pattern."
            echo "::error::Allowed prefixes: cove, devin, devon, clawd, cassian, antigravity, openclaw, dependabot, release, feature, fix, chore, hotfix, docs, refactor, test, ci."
            exit 1
          fi

  markdown-lint:
    name: Markdown validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'
          folder-path: '.'
        continue-on-error: true

      - name: Validate YAML frontmatter in authority files
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          errors=0
          for f in $(find 00_authority -name '*.md' 2>/dev/null); do
            if head -1 "$f" | grep -q '^---'; then
              if ! python3 -c "
          import yaml, sys
          with open('$f') as fh:
              content = fh.read()
              parts = content.split('---', 2)
              if len(parts) >= 3:
                  yaml.safe_load(parts[1])
                  print('OK: $f')
              else:
                  print('WARN: $f — no closing frontmatter delimiter')
          " 2>&1; then
                echo "::error::Invalid YAML frontmatter in $f"
                errors=$((errors + 1))
              fi
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors file(s) with invalid YAML frontmatter."
            exit 1
          fi
          echo "All authority file frontmatter is valid."

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Python files
        id: check
        run: |
          if find . -name '*.py' -not -path './.git/*' | grep -q .; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ruff
        if: steps.check.outputs.has_python == 'true'
        continue-on-error: true
        run: |
          pip install --quiet ruff
          ruff check --select E,F,W --ignore E501 .

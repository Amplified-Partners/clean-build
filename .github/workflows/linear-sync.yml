name: Sync PR merge to Linear

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  linear-update:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Extract Linear ticket ID
        id: ticket
        run: |
          # Look for AMP-XXX in PR title or body
          TITLE="${{ github.event.pull_request.title }}"
          BODY=$(cat << 'BODY_EOF'
          ${{ github.event.pull_request.body }}
          BODY_EOF
          )

          # Check title first, then body
          TICKET=$(echo "$TITLE" | grep -oP 'AMP-\d+' | head -1)
          if [ -z "$TICKET" ]; then
            TICKET=$(echo "$BODY" | grep -oP 'AMP-\d+' | head -1)
          fi

          if [ -z "$TICKET" ]; then
            echo "No AMP-XXX ticket found in PR title or body. Skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found ticket: $TICKET"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "ticket_id=$TICKET" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Linear ticket
        if: steps.ticket.outputs.found == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TICKET_ID: ${{ steps.ticket.outputs.ticket_id }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_NAME: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          api_key = os.environ["LINEAR_API_KEY"]
          ticket_id = os.environ["TICKET_ID"]
          pr_title = os.environ["PR_TITLE"]
          pr_url = os.environ["PR_URL"]
          pr_author = os.environ["PR_AUTHOR"]
          repo = os.environ["REPO_NAME"]

          # First, find the issue by identifier
          query = """
          query($id: String!) {
            issueSearch(filter: { number: { eq: $number } }, first: 1) {
              nodes { id identifier state { name } }
            }
          }
          """

          # Use identifier filter instead
          number = int(ticket_id.split("-")[1])
          query = """
          mutation($issueId: String!, $comment: String!) {
            issueAddComment: commentCreate(input: { issueId: $issueId, body: $comment }) {
              success
            }
          }
          """

          # Step 1: Find issue ID by identifier
          find_query = json.dumps({
              "query": '{ issues(filter: { number: { eq: ' + str(number) + ' } }) { nodes { id identifier state { name } } } }'
          }).encode()

          req = urllib.request.Request(
              "https://api.linear.app/graphql",
              data=find_query,
              headers={
                  "Authorization": api_key,
                  "Content-Type": "application/json"
              }
          )

          try:
              resp = urllib.request.urlopen(req, timeout=30)
              data = json.loads(resp.read())
              issues = data.get("data", {}).get("issues", {}).get("nodes", [])

              if not issues:
                  print(f"No Linear issue found for {ticket_id}")
                  exit(0)

              issue = issues[0]
              issue_id = issue["id"]
              print(f"Found issue: {issue['identifier']} (state: {issue['state']['name']})")

              # Step 2: Add comment about the merge
              comment = f"**PR merged** → [{pr_title}]({pr_url})\n\nRepo: `{repo}`\nAuthor: `{pr_author}`"

              comment_mutation = json.dumps({
                  "query": 'mutation { commentCreate(input: { issueId: "' + issue_id + '", body: "' + comment.replace('"', '\\"') + '" }) { success } }'
              }).encode()

              req = urllib.request.Request(
                  "https://api.linear.app/graphql",
                  data=comment_mutation,
                  headers={
                      "Authorization": api_key,
                      "Content-Type": "application/json"
                  }
              )
              resp = urllib.request.urlopen(req, timeout=30)
              result = json.loads(resp.read())
              print(f"Comment added: {result}")

              # Step 3: Transition to Done state (find the Done state ID first)
              states_query = json.dumps({
                  "query": '{ workflowStates(filter: { name: { in: ["Done", "Merged"] } }) { nodes { id name } } }'
              }).encode()

              req = urllib.request.Request(
                  "https://api.linear.app/graphql",
                  data=states_query,
                  headers={
                      "Authorization": api_key,
                      "Content-Type": "application/json"
                  }
              )
              resp = urllib.request.urlopen(req, timeout=30)
              states_data = json.loads(resp.read())
              states = states_data.get("data", {}).get("workflowStates", {}).get("nodes", [])

              done_state = next((s for s in states if s["name"] == "Done"), None)
              if done_state:
                  update_mutation = json.dumps({
                      "query": 'mutation { issueUpdate(id: "' + issue_id + '", input: { stateId: "' + done_state["id"] + '" }) { success } }'
                  }).encode()

                  req = urllib.request.Request(
                      "https://api.linear.app/graphql",
                      data=update_mutation,
                      headers={
                          "Authorization": api_key,
                          "Content-Type": "application/json"
                      }
                  )
                  resp = urllib.request.urlopen(req, timeout=30)
                  result = json.loads(resp.read())
                  print(f"Issue moved to Done: {result}")
              else:
                  print("No 'Done' state found — skipping state transition")

          except Exception as e:
              print(f"Linear API error: {type(e).__name__}: {e}")
              exit(0)  # Don't fail the workflow on Linear errors
          PYEOF

# Dependabot config — standardised across Amplified-Partners org.
# Schedule: weekly, Monday 09:00 UTC. Limit: 5 PRs per ecosystem.
# Minor/patch: auto-merge. Major: requires review.
# Devon-4c1a | 2026-05-06 | Dependabot standardisation
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

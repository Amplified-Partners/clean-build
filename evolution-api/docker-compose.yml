version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution_pass
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-network

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-your-super-secret-key}
      - AUTHENTICATION_TYPE=apikey

      # WhatsApp Configuration
      - WA_ENGINE=whatsapp-web.js
      - WA_AUTO_RESTART=true

      # Webhook Configuration
      - WEBHOOK_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${WEBHOOK_URL:-http://host.docker.internal:3000/webhook}
      - WEBHOOK_EVENTS_MESSAGE_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true

      # Database (PostgreSQL)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_pass@postgres:5432/evolution?schema=public

      # Cache
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true

      # Log Level
      - LOG_LEVEL=info

    volumes:
      - ./evolution_instances:/evolution/instances
      - ./evolution_logs:/evolution/logs

    depends_on:
      - postgres

    networks:
      - evolution-network

networks:
  evolution-network:
    driver: bridge

volumes:
  postgres_data:
